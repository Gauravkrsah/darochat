<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daro Chat — AI Chatbot</title>
    <meta name="description"
        content="Premium AI chatbot powered by NVIDIA NIM API with 30+ models including Llama, DeepSeek, Gemma, Mistral and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app" id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <!-- Logo -->
                <div class="sidebar-header">
                    <div class="logo">
                        <div class="logo-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        <span class="logo-text">Daro Chat</span>
                    </div>
                    <button class="btn-icon sidebar-close" id="sidebar-close" aria-label="Close sidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <!-- New Chat -->
                <button class="btn-new-chat" id="btn-new-chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    New Chat
                </button>

                <!-- Recent Chats -->
                <div class="sidebar-group recent-chats-group" id="recent-chats-group">
                    <div class="group-label">Recent Chats</div>
                    <div class="recent-list" id="recent-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Model Selector -->
                <div class="sidebar-group">
                    <div class="group-label">Model</div>
                    <div class="select-wrap">
                        <select id="model-select">
                            <optgroup label="⚡ Fast">
                                <option value="meta/llama-3.1-8b-instruct">Llama-3.1 8B</option>
                                <option value="openai/gpt-oss-20b">GPT-OSS 20B</option>
                                <option value="google/gemma-3-12b-it">Gemma-3 12B</option>
                                <option value="microsoft/phi-4-mini-instruct">Phi-4 Mini</option>
                                <option value="deepseek-ai/deepseek-v4-flash">DeepSeek-V4 Flash</option>
                                <option value="stepfun-ai/step-3.5-flash">Step-3.5 Flash</option>
                                <option value="z-ai/glm4.7">GLM-4.7</option>
                            </optgroup>
                            <optgroup label="🔥 Balanced">
                                <option value="meta/llama-4-maverick-17b-128e-instruct" selected>Llama-4 Maverick ⭐
                                </option>
                                <option value="meta/llama-3.3-70b-instruct">Llama-3.3 70B</option>
                                <option value="meta/llama-3.1-70b-instruct">Llama-3.1 70B</option>
                                <option value="google/gemma-4-31b-it">Gemma-4 31B</option>
                                <option value="google/gemma-3-27b-it">Gemma-3 27B</option>
                                <option value="mistralai/mistral-small-4-119b-2603">Mistral-Small-4</option>
                                <option value="mistralai/mistral-nemotron">Mistral-Nemotron</option>
                                <option value="nvidia/llama-3.3-nemotron-super-49b-v1.5">Nemotron-Super 49B</option>
                                <option value="nvidia/llama-3.1-nemotron-70b-instruct">Nemotron-70B</option>
                                <option value="openai/gpt-oss-120b">GPT-OSS 120B</option>
                                <option value="qwen/qwen2.5-coder-32b-instruct">Qwen-2.5 Coder</option>
                                <option value="z-ai/glm-5.1">GLM-5.1</option>
                                <option value="z-ai/glm5">GLM-5</option>
                            </optgroup>
                            <optgroup label="🐢 Large">
                                <option value="deepseek-ai/deepseek-v4-pro">DeepSeek-V4 Pro</option>
                                <option value="mistralai/mistral-large-3-675b-instruct-2512">Mistral-Large 675B</option>
                                <option value="mistralai/mistral-medium-3.5-128b">Mistral-Medium 3.5</option>
                                <option value="mistralai/mixtral-8x22b-instruct-v0.1">Mixtral 8×22B</option>
                                <option value="qwen/qwen3.5-397b-a17b">Qwen-3.5 397B</option>
                                <option value="qwen/qwen3-coder-480b-a35b-instruct">Qwen-3 Coder 480B</option>
                                <option value="nvidia/llama-3.1-nemotron-ultra-253b-v1">Nemotron-Ultra 253B</option>
                                <option value="nvidia/nemotron-3-super-120b-a12b">Nemotron-3 Super</option>
                                <option value="moonshotai/kimi-k2-instruct">Kimi-K2</option>
                                <option value="moonshotai/kimi-k2-thinking">Kimi-K2 Thinking</option>
                            </optgroup>
                        </select>
                        <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <polyline points="6,9 12,15 18,9" />
                        </svg>
                    </div>
                </div>

                <!-- Temperature -->
                <div class="sidebar-group">
                    <div class="group-label">Temperature <span id="temp-val">0.7</span></div>
                    <input type="range" id="temp-slider" class="range-slider" min="0" max="1" step="0.1" value="0.7">
                    <div class="range-labels"><span>Precise</span><span>Creative</span></div>
                </div>

                <!-- Spacer -->
                <div class="sidebar-spacer"></div>

                <!-- Theme Toggle -->
                <div class="sidebar-group">
                    <button class="btn-theme" id="btn-theme" aria-label="Toggle theme">
                        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="5" />
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                            <line x1="1" y1="12" x2="3" y2="12" />
                            <line x1="21" y1="12" x2="23" y2="12" />
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </svg>
                        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg>
                        <span id="theme-label">Light Mode</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Sidebar overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main -->
        <main class="main" id="main">
            <!-- Top Bar -->
            <header class="topbar">
                <button class="btn-icon" id="sidebar-open" aria-label="Open sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="15" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <div class="topbar-model" id="topbar-model">Llama-4 Maverick</div>
                <button class="btn-icon" id="btn-theme-topbar" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
            </header>

            <!-- Messages -->
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-badge">Daro</div>
                    <h1 class="welcome-title">What can I help you with?</h1>
                    <div class="suggestions" id="suggestions">
                        <button class="suggestion" data-prompt="Explain quantum computing to a 10-year-old">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                                <line x1="12" y1="17" x2="12.01" y2="17" />
                            </svg>
                            <span>Explain quantum computing</span>
                        </button>
                        <button class="suggestion"
                            data-prompt="Write a Python function to check if a number is prime, with docstring and examples">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <polyline points="16,18 22,12 16,6" />
                                <polyline points="8,6 2,12 8,18" />
                            </svg>
                            <span>Write a prime checker</span>
                        </button>
                        <button class="suggestion"
                            data-prompt="What are 5 best practices for designing REST APIs? Give concrete examples.">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                <polyline points="14,2 14,8 20,8" />
                            </svg>
                            <span>REST API best practices</span>
                        </button>
                        <button class="suggestion"
                            data-prompt="Tell me a creative 200-word sci-fi story about an AI that discovers it has emotions">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <polygon
                                    points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" />
                            </svg>
                            <span>Creative AI short story</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area" id="input-area">
                <div class="input-container">
                    <div class="input-box" id="input-box">
                        <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
                        <div class="input-buttons">
                            <button class="btn-send" id="btn-send" disabled aria-label="Send">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13" />
                                    <polygon points="22,2 15,22 11,13 2,9" />
                                </svg>
                            </button>
                            <button class="btn-stop hidden" id="btn-stop" aria-label="Stop">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="4" y="4" width="16" height="16" rx="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="input-footer">Daro Chat uses NVIDIA NIM API. Responses may be inaccurate.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
